<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICCR - Aniversariantes do Mês</title>
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dialogs.css">
    <link rel="stylesheet" href="./adm/css/style.css">
    <link rel="stylesheet" href="./adm/css/dialogs.css">
    <link rel="stylesheet" href="./css/ui-kit.css">
    <script type="module" src="./js/scripts.js"></script>
</head>
<body>
    <!-- Formulário de Login DIALOG -->
    <dialog id="dialogLogin">
        <fieldset>
            <legend>Login</legend>
            <form id="frmLogin">
                <div class="row">
                    <input type="text" name="txtLogin" id="txtLogin" class="formInput" placeholder="Digite o seu login">
                </div>
                <div class="row">
                    <input type="password" name="txtSenha" id="txtSenha" class="formInput" placeholder="Digite a sua senha">
                </div>
                <p id="loginErro" class="login-erro" hidden></p>
                <div class="row">
                    <button id="btnLogin" type="button">Entrar</button>
                    <button id="btnCancelarLogin" type="button">Cancelar</button>
                </div>
            </form>
        </fieldset>
    </dialog>

    <div class="container">
        <header>
            <a href="/">
                <img src="./img/logo.png" alt="Logo do CCR" title="Logo do CCR" class="logo">
            </a>
            <div class="acesso">
                <a href="#" id="btnEntrar" class="">Entrar</a>
            </div>
        </header>
        <div>
            <responsive-menu></responsive-menu>
        </div>
        <main class="flex flex--column">
            <section class="titulo_secao flex justify--space--between align--items--center" style="flex-wrap:wrap;gap:10px">
                <h1 class="flex align--items--center gap--10"><i class="bi bi-balloon-heart"></i> Aniversariantes do Mês</h1>
                <div class="flex gap--10 align--items--center">
                    <label class="painelLabel" for="anivMes" style="white-space:nowrap">Mês:</label>
                    <select id="anivMes" class="formInput" style="padding:6px 10px"></select>
                </div>
            </section>

            <section id="anivDirecao" class="informacoes_painel" style="display:none;margin-bottom:12px">
                <div class="flex align--items--center gap--15 flex--wrap">
                    <span id="anivHoje" style="font-weight:600"></span>
                    <button type="button" id="anivEnviar" class="btnPainelFormulario">🎉 Enviar parabéns aos de hoje</button>
                    <label class="flex align--items--center gap--5 cursor--pointer">
                        <input type="checkbox" id="anivAuto"> Enviar automaticamente todo dia
                    </label>
                    <span id="anivFeedback" style="flex-basis:100%"></span>
                </div>
            </section>

            <section id="anivLista" style="padding:6px 4px"></section>
        </main>
        <footer>Rodapé</footer>
    </div>

    <script type="module" src="./js/components/index.js"></script>
</body>
</html>
