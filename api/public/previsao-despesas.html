<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICCR - Sistema Integrado Centro de Ciências Rurais</title>
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dialogs.css">
    <link rel="stylesheet" href="./adm/css/style.css">
    <link rel="stylesheet" href="./adm/css/dialogs.css">
    <link rel="stylesheet" href="./css/ui-kit.css">
    <script type="module" src="./js/scripts.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="/">
                <img src="./img/logo.png" alt="Logo do CCR" title="Logo do CCR" class="logo">
            </a>
            <div class="acesso">
                <a href="#" id="btnEntrar" class="">Entrar</a>
            </div>
        </header>
        <div>
            <responsive-menu></responsive-menu>
        </div>
        <main class="flex flex--column flex--center">

            <section class="titulo_secao flex justify--space--between align--items--center">
                <h1>Previsão de Despesas</h1>
                <button class="btn_adicionar">+ Adicionar</button>
            </section>

            <section class="divListaTiposRecursos informacoes_painel">
                <div class="cabecalho flex">
                    <div class="titulo flex flex--2">Cód.</div>
                    <div class="titulo flex flex--5">Subunidade</div>
                    <div class="titulo flex flex--4">Tipo de Despesa</div>
                    <div class="titulo flex flex--3">Valor Previsto</div>
                    <div class="titulo flex flex--2">Ano</div>
                    <div class="titulo flex flex--6">Observação</div>
                    <div class="titulo flex flex--2">Ações</div>
                </div>

                <div class="listaTiposRecursos">
                    <!-- Previsões serão carregadas dinamicamente -->
                </div>
            </section>

        </main>
        <footer>Rodapé</footer>
    </div>


    <!-- Formulário de Login DIALOG -->
    <dialog id="dialogLogin">
        <fieldset>
            <legend>Login</legend>

            <form id="frmLogin">
                <div class="row">
                    <input type="text" name="txtLogin" id="txtLogin" class="formInput" placeholder="Digite o seu login">
                </div>
                <div class="row">
                    <input type="password" name="txtSenha" id="txtSenha" class="formInput" placeholder="Digite a sua senha">
                </div>
                <div class="row">
                    <button id="btnLogin">Entrar</button>
                    <button id="btnCancelarLogin">Cancelar</button>
                </div>
            </form>
        </fieldset>
    </dialog>
    <!-- Fim formulário de Login DIALOG -->

    <!-- Formulário de previsão -->
    <dialog class="dialogPainel unidades">
        <fieldset>
            <legend>Registrar Previsão de Despesa</legend>

            <form class="frmCadastroPainel frmUnidade flex flex--column gap--15">
                <input type="hidden" name="id_previsao" id="id_previsao">

                <div class="row">
                    <select name="subunidade_id" id="subunidade_id" class="listaSelect formInput width--100">
                        <option value="">Selecione a subunidade...</option>
                    </select>
                    <label for="subunidade_id" class="painelLabel">Subunidade</label>
                </div>

                <div class="row">
                    <select name="id_tipo_despesa" id="id_tipo_despesa" class="listaSelect formInput width--100">
                        <option value="">Selecione o tipo de despesa...</option>
                    </select>
                    <label for="id_tipo_despesa" class="painelLabel">Tipo de despesa</label>
                </div>

                <div class="row">
                    <input type="text" name="valor_previsto" id="valor_previsto" class="formInput width--100" placeholder="Ex.: 5000,00">
                    <label for="valor_previsto" class="painelLabel">Valor previsto (R$)</label>
                </div>

                <div class="row">
                    <input type="number" name="ano_referencia" id="ano_referencia" class="formInput width--100" placeholder="Ex.: 2026" min="2000" max="2100">
                    <label for="ano_referencia" class="painelLabel">Ano de referência</label>
                </div>

                <div class="row">
                    <textarea name="observacao" id="observacao" class="formInput width--100" placeholder="Observações (opcional)..."></textarea>
                    <label for="observacao" class="painelLabel">Observação (opcional)</label>
                </div>

                <div class="row">
                    <button type="button" class="btnPainelFormulario cadastrarUnidade">Cadastrar</button>
                    <button type="button" class="btnPainelFormulario atualizarUnidade">Atualizar</button>
                    <button type="button" class="btnPainelFormulario cancelarUnidade">Cancelar</button>
                </div>
            </form>
        </fieldset>
    </dialog>
    <!-- Fim formulário de previsão -->

    <script type="module" src="./js/components/index.js"></script>
</body>
</html>
