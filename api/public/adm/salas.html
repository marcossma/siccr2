<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICCR - Sistema Integrado Centro de Ciências Rurais</title>
    <link rel="shortcut icon" href="../img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dialogs.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/ui-kit.css">
    <link rel="stylesheet" href="./css/dialogs.css">
    <script src="./js/guard.js"></script>
    <script type="module" src="./js/script.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="/">
                <img src="../img/logo.png" alt="Logo do CCR" title="Logo do CCR" class="logo">
            </a>
            <div class="acesso">
                <span id="adminNome"></span>
                <a href="#" id="btnSair">Sair</a>
            </div>
        </header>
        <div>
            <responsive-menu></responsive-menu>
        </div>
        <main class="flex flex--column">
            <section class="titulo_painel flex justify--space--between align--items--center">
                <h1 class="flex align--items--center gap--15">
                    <i class="bi bi-door-closed font--size--40"></i>
                    Painel Administrativo - Salas
                </h1>

                <button class="btn_adicionar sala flex align--items--center gap--10 cursor--pointer">Adicionar <i class="bi bi-door-closed font--size--20"></i></i></button>
            </section>

             <div>
                <menu-navegacao-adm></menu-navegacao-adm>
            </div>

            <section class="flex gap--10 align--items--center flex--wrap" style="margin:8px 0">
                <input type="text" id="filtroBusca" class="formInput" placeholder="🔎 Buscar em todas as colunas…" style="flex:1;min-width:200px;padding:6px 10px">
                <select id="filtroPredio" class="formInput" style="padding:6px 10px"></select>
                <select id="filtroTipo" class="formInput" style="padding:6px 10px"></select>
                <select id="filtroDepto" class="formInput" style="padding:6px 10px"></select>
                <button type="button" id="filtroLimpar" class="btnPainelFormulario" style="padding:6px 12px">Limpar</button>
                <span id="filtroContagem" class="painelLabel" style="white-space:nowrap"></span>
            </section>

            <section class="informacoes_painel">
                <div class="cabecalho flex">
                    <div class="titulo flex flex--2">Sala</div>
                    <div class="titulo flex flex--2">Prédio</div>
                    <div class="titulo flex flex--3">Departamento</div>
                    <div class="titulo flex flex--2">Tipo</div>
                    <div class="titulo flex flex--1">Lugares</div>
                    <div class="titulo flex flex--4">Descrição</div>
                    <div class="titulo flex flex--2">Agendável</div>
                    <div class="titulo flex flex--2">Ações</div>
                </div>

                <div class="listaUnidades">
                    <!-- As salas serã carregadas dinamicamente do banco de dados -->
                </div>
            </section>
            
        </main>
        <footer>Rodapé</footer>
    </div>

    <!-- Formulário cadastro de Sala -->
    <dialog class="dialogPainel unidades">
        <fieldset>
            <legend>Cadastro de Sala</legend>

            <form class="frmCadastroPainel frmUnidade flex flex--column gap--15">
                <div class="row">
                    <input type="hidden" name="sala_id" id="sala_id">
                    <input type="text" name="sala_nome" id="sala_nome" class="formInput width--100" placeholder="Digite a identificação da sala">
                    <label class="painelLabel" for="sala_nome">Ex.: 106, 4303-A</label>
                </div>

                <div class="row">
                    <select name="predio_id" id="predio_id" class="formInput width--100">
                        <!-- Options serão adicionados dinamicamente -->
                    </select>
                    <label class="painelLabel" for="predio_id">Selecione o prédio...</label>
                </div>

                <div class="row">
                    <select name="subunidade_id" id="subunidade_id" class="formInput width--100">
                        <!-- Options serão adicionados dinamicamente -->
                    </select>
                    <label class="painelLabel" for="subunidade_id">Selecione a subunidade...</label>
                </div>

                <div class="row">
                    <select name="sala_tipo_id" id="sala_tipo_id" class="formInput width--100">
                        <!-- Options serão adicionados dinamicamente -->
                    </select>
                    <label class="painelLabel" for="sala_tipo_id">Selecione o tipo de sala...</label>
                </div>

                <div class="row">
                    <input type="number" name="sala_capacidade" id="sala_capacidade" class="formInput width--100" placeholder="Número de lugares (opcional)" min="0">
                    <label class="painelLabel" for="sala_capacidade">Capacidade — quantidade de lugares</label>
                </div>

                <div class="row flex gap--10">
                    <div class="flex flex--column flex--1">
                        <input type="number" step="0.01" min="0" name="sala_largura" id="sala_largura" class="formInput width--100" placeholder="Largura (m)">
                        <label class="painelLabel" for="sala_largura">Largura (m)</label>
                    </div>
                    <div class="flex flex--column flex--1">
                        <input type="number" step="0.01" min="0" name="sala_comprimento" id="sala_comprimento" class="formInput width--100" placeholder="Comprimento (m)">
                        <label class="painelLabel" for="sala_comprimento">Comprimento (m)</label>
                    </div>
                    <div class="flex flex--column flex--1">
                        <input type="number" step="0.01" min="0" name="sala_altura" id="sala_altura" class="formInput width--100" placeholder="Altura (m)">
                        <label class="painelLabel" for="sala_altura">Altura (m)</label>
                    </div>
                </div>

                <div class="row">
                    <textarea name="sala_descricao" id="sala_descricao" class="formInput width--100" placeholder="Digite alguma observação/descrição sobre a sala... (opcional)"></textarea>
                </div>

                <div class="row flex justify--content--center align--items--center gap--10">
                    <label for="" class="formLabel">Sala agendável: </label>
                    <div class="flex align--items--center justify--content--center gap--20">
                        <span>
                            <input type="radio" name="is_agendavel" value="0" checked> Não
                        </span>
                        <span>
                            <input type="radio" name="is_agendavel" value="1"> Sim
                        </span>
                    </div>
                </div>

                <!-- Fora do ensalamento (agendada só sob solicitação): auditórios, NUSI etc. -->
                <div class="row flex justify--content--center align--items--center gap--10">
                    <label for="" class="formLabel" title="A sala não entra no ensalamento de aulas; continua agendável via solicitação">Somente agendamento manual: </label>
                    <div class="flex align--items--center justify--content--center gap--20">
                        <span>
                            <input type="radio" name="agendamento_manual" value="0" checked> Não
                        </span>
                        <span>
                            <input type="radio" name="agendamento_manual" value="1"> Sim
                        </span>
                    </div>
                </div>

                <!-- Aparece apenas quando o tipo é Laboratório (controle via JS) -->
                <div class="row flex justify--content--center align--items--center gap--10" id="rowServicosExternos" style="display:none">
                    <label for="" class="formLabel">Presta serviços externos:</label>
                    <div class="flex align--items--center justify--content--center gap--20">
                        <span>
                            <input type="radio" name="presta_servicos_externos" value="0" checked> Não
                        </span>
                        <span>
                            <input type="radio" name="presta_servicos_externos" value="1"> Sim
                        </span>
                    </div>
                </div>

                <div class="row">
                    <button type="button" class="btnPainelFormulario cadastrarUnidade">Cadastrar</button>
                    <button type="button" class="btnPainelFormulario atualizarUnidade">Atualizar</button>
                    <button type="button" class="btnPainelFormulario cancelarUnidade">Cancelar</button>
                </div>
            </form>
        </fieldset>
    </dialog>
    <!-- Fim formulário cadastro Unidade -->

    <!-- Dialog: patrimônio (bens permanentes) da sala -->
    <dialog class="dialogPainel" id="dialogPatrimonio" style="min-width:600px" data-sala-id="">
        <fieldset>
            <legend id="dialogPatrimonioLegend">Patrimônio da sala</legend>

            <div id="listaBens" style="margin-bottom:15px"></div>

            <div id="tituloAddBem" class="pedido-secao-titulo" style="font-weight:600;margin-bottom:8px">Adicionar bem</div>
            <form id="frmBem" class="flex flex--column gap--10">
                <input type="hidden" id="id_bem">
                <div class="flex flex--column gap--5">
                    <label class="painelLabel" for="numero_registro">Número de registro (etiqueta)</label>
                    <div class="flex gap--10 align--items--center">
                        <input type="text" id="numero_registro" class="formInput flex--1" placeholder="Digite ou escaneie o código" autocomplete="off">
                        <button type="button" id="btnEscanear" class="btnPainelFormulario" style="height:38px;white-space:nowrap">
                            <i class="bi bi-upc-scan"></i> Escanear
                        </button>
                    </div>
                </div>

                <!-- Área da câmera (aparece ao escanear; requer HTTPS + suporte a BarcodeDetector) -->
                <div id="scannerArea" style="display:none">
                    <video id="scannerVideo" style="width:100%;max-height:280px;background:#000;border-radius:6px" muted playsinline></video>
                    <div class="flex gap--10 align--items--center" style="margin-top:6px">
                        <span id="scannerStatus" style="font-size:13px;color:#555">Aponte a câmera para o código de barras…</span>
                        <button type="button" id="btnPararScan" class="btnPainelFormulario" style="height:30px;padding:2px 10px;font-size:12px;margin-left:auto">Parar</button>
                    </div>
                </div>

                <div class="flex flex--column gap--5">
                    <label class="painelLabel" for="bem_descricao">Descrição do bem</label>
                    <input type="text" id="bem_descricao" class="formInput width--100" placeholder="Ex.: Cadeira estofada, Projetor Epson...">
                </div>

                <div class="flex gap--10 flex--wrap">
                    <div class="flex flex--column gap--5 flex--1">
                        <label class="painelLabel" for="bem_estado">Estado de conservação</label>
                        <select id="bem_estado" class="formInput">
                            <option value="">—</option>
                            <option value="novo">Novo</option>
                            <option value="bom">Bom</option>
                            <option value="regular">Regular</option>
                            <option value="ruim">Ruim</option>
                            <option value="inservivel">Inservível</option>
                        </select>
                    </div>
                    <div class="flex flex--column gap--5 flex--1">
                        <label class="painelLabel" for="bem_data">Data do levantamento</label>
                        <input type="date" id="bem_data" class="formInput">
                    </div>
                </div>

                <div class="flex flex--column gap--5">
                    <label class="painelLabel" for="bem_observacao">Observação (opcional)</label>
                    <input type="text" id="bem_observacao" class="formInput width--100" placeholder="Observação">
                </div>

                <div id="bemFeedback"></div>

                <div class="flex gap--10">
                    <button type="button" id="btnSalvarBem" class="btnPainelFormulario">Adicionar</button>
                    <button type="button" id="btnCancelarEdicaoBem" class="btnPainelFormulario cancelarUnidade" style="display:none">Cancelar edição</button>
                </div>
            </form>

            <div class="row" style="margin-top:15px">
                <button type="button" id="btnFecharPatrimonio" class="btnPainelFormulario cancelarUnidade">Fechar</button>
            </div>
        </fieldset>
    </dialog>

    <!-- Dialog: histórico da sala -->
    <dialog class="dialogPainel" id="dialogHistSala" style="min-width:480px">
        <fieldset>
            <legend id="histSalaLegend">Histórico da sala</legend>
            <div id="histSalaLista" style="margin-bottom:12px"></div>
            <div class="row"><button type="button" id="btnFecharHistSala" class="btnPainelFormulario cancelarUnidade">Fechar</button></div>
        </fieldset>
    </dialog>

    <script type="module" src="../js/components/index.js"></script>
</body>
</html>
