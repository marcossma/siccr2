<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICCR - Períodos Letivos</title>
    <link rel="shortcut icon" href="../img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dialogs.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/ui-kit.css">
    <link rel="stylesheet" href="./css/dialogs.css">
    <script src="./js/guard.js"></script>
    <script type="module" src="./js/script.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="/">
                <img src="../img/logo.png" alt="Logo do CCR" title="Logo do CCR" class="logo">
            </a>
            <div class="acesso">
                <span id="adminNome"></span>
                <a href="#" id="btnSair">Sair</a>
            </div>
        </header>
        <div>
            <responsive-menu></responsive-menu>
        </div>
        <main class="flex flex--column">
            <section class="titulo_painel flex justify--space--between align--items--center">
                <h1 class="flex align--items--center gap--15">
                    <i class="bi bi-calendar-range font--size--40"></i>
                    Painel Administrativo - Períodos Letivos
                </h1>
                <button class="btn_adicionar periodo flex align--items--center gap--10 cursor--pointer">Adicionar <i class="bi bi-calendar-plus font--size--20"></i></button>
            </section>

            <div>
                <menu-navegacao-adm></menu-navegacao-adm>
            </div>

            <section class="informacoes_painel">
                <div class="cabecalho flex">
                    <div class="titulo flex flex--3">Período</div>
                    <div class="titulo flex flex--3">Início</div>
                    <div class="titulo flex flex--3">Fim</div>
                    <div class="titulo flex flex--2">Ativo</div>
                    <div class="titulo flex flex--2">Ações</div>
                </div>
                <div class="listaUnidades">
                    <!-- carregado via JS -->
                </div>
            </section>
        </main>
        <footer>Rodapé</footer>
    </div>

    <dialog class="dialogPainel unidades">
        <fieldset>
            <legend>Cadastro de Período Letivo</legend>
            <form class="frmCadastroPainel frmUnidade flex flex--column gap--15">
                <div class="row">
                    <input type="hidden" name="id_periodo" id="id_periodo">
                    <input type="text" name="nome" id="nome" class="formInput width--100" placeholder="Ex.: 2026.1">
                    <label class="painelLabel" for="nome">Identificação do período</label>
                </div>
                <div class="row">
                    <input type="date" name="data_inicio" id="data_inicio" class="formInput width--100">
                    <label class="painelLabel" for="data_inicio">Data de início</label>
                </div>
                <div class="row">
                    <input type="date" name="data_fim" id="data_fim" class="formInput width--100">
                    <label class="painelLabel" for="data_fim">Data de fim</label>
                </div>
                <div class="row flex align--items--center gap--10">
                    <input type="checkbox" name="ativo" id="ativo" value="1">
                    <label class="painelLabel" for="ativo">Período ativo (apenas um pode estar ativo)</label>
                </div>
                <div class="row">
                    <button type="button" class="btnPainelFormulario cadastrarUnidade">Cadastrar</button>
                    <button type="button" class="btnPainelFormulario atualizarUnidade">Atualizar</button>
                    <button type="button" class="btnPainelFormulario cancelarUnidade">Cancelar</button>
                </div>
            </form>
        </fieldset>
    </dialog>

    <script type="module" src="../js/components/index.js"></script>
</body>
</html>
