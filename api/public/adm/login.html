<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICCR - Acesso Administrativo</title>
    <link rel="shortcut icon" href="../img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }

        .login-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 380px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo img {
            max-height: 60px;
        }

        .login-titulo {
            text-align: center;
            font-size: 18px;
            color: #009536;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .login-subtitulo {
            text-align: center;
            font-size: 12px;
            color: gray;
            margin-bottom: 30px;
        }

        .login-grupo {
            margin-bottom: 16px;
        }

        .login-label {
            display: block;
            font-size: 11px;
            color: gray;
            margin-bottom: 4px;
        }

        .login-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .login-input:focus {
            border-color: #009536;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #009536;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background-color: #007a2c;
        }

        .login-btn:disabled {
            background-color: #aaa;
            cursor: not-allowed;
        }

        .login-erro {
            background-color: #fff0f0;
            border: 1px solid #ffcccc;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 12px;
            color: #cc0000;
            margin-bottom: 16px;
            display: none;
        }

        .login-erro.visivel {
            display: block;
        }

        .login-voltar {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }

        .login-voltar a {
            color: #009536;
        }

        .login-voltar a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <img src="../img/logo.png" alt="Logo CCR">
        </div>

        <p class="login-titulo">Painel Administrativo</p>
        <p class="login-subtitulo">Acesso restrito a administradores do sistema</p>

        <div class="login-erro" id="msgErro"></div>

        <form id="frmLoginAdmin">
            <div class="login-grupo">
                <label class="login-label" for="txtSiape">SIAPE</label>
                <input type="text" id="txtSiape" class="login-input" placeholder="Digite seu SIAPE" autocomplete="username" required>
            </div>
            <div class="login-grupo">
                <label class="login-label" for="txtSenha">Senha</label>
                <input type="password" id="txtSenha" class="login-input" placeholder="Digite sua senha" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn" id="btnEntrar">Entrar</button>
        </form>

        <div class="login-voltar">
            <a href="/">Voltar para o site</a>
        </div>
    </div>

    <script src="./js/login.js" defer></script>
</body>
</html>
