<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICCR - Verificar Pedidos de Almoxarifado</title>
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dialogs.css">
    <link rel="stylesheet" href="./adm/css/style.css">
    <link rel="stylesheet" href="./adm/css/dialogs.css">
    <link rel="stylesheet" href="./css/ui-kit.css">
    <script type="module" src="./js/scripts.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="/">
                <img src="./img/logo.png" alt="Logo do CCR" title="Logo do CCR" class="logo">
            </a>
            <div class="acesso">
                <a href="#" id="btnEntrar" class="">Entrar</a>
            </div>
        </header>
        <div>
            <responsive-menu></responsive-menu>
        </div>
        <main class="flex flex--column flex--center">

            <section class="titulo_secao flex justify--space--between align--items--center">
                <h1>Verificar Pedidos de Almoxarifado</h1>
                <!-- Filtro de status -->
                <div class="flex gap--10 align--items--center">
                    <label class="painelLabel" for="filtroStatus" style="white-space:nowrap">Exibir:</label>
                    <select id="filtroStatus" class="formInput" style="padding:6px 10px">
                        <option value="pendente">Pendentes</option>
                        <option value="atendido">Atendidos</option>
                        <option value="todos">Todos</option>
                    </select>
                </div>
            </section>

            <!-- Lista de pedidos -->
            <section class="divListaTiposRecursos informacoes_painel">
                <div class="cabecalho flex">
                    <div class="titulo flex flex--1">Nº</div>
                    <div class="titulo flex flex--3">Setor</div>
                    <div class="titulo flex flex--1">Itens</div>
                    <div class="titulo flex flex--3">Solicitado</div>
                    <div class="titulo flex flex--3">Concluído</div>
                    <div class="titulo flex flex--2">Status</div>
                    <div class="titulo flex flex--2">Ações</div>
                </div>
                <div id="listaPedidosSID">
                    <!-- Carregado via JS -->
                </div>
            </section>

        </main>
        <footer>Rodapé</footer>
    </div>

    <!-- Formulário de Login DIALOG -->
    <dialog id="dialogLogin">
        <fieldset>
            <legend>Login</legend>
            <form id="frmLogin">
                <div class="row">
                    <input type="text" name="txtLogin" id="txtLogin" class="formInput" placeholder="Digite o seu login">
                </div>
                <div class="row">
                    <input type="password" name="txtSenha" id="txtSenha" class="formInput" placeholder="Digite a sua senha">
                </div>
                <p id="loginErro" class="login-erro" hidden></p>
                <div class="row">
                    <button id="btnLogin" type="button">Entrar</button>
                    <button id="btnCancelarLogin" type="button">Cancelar</button>
                </div>
            </form>
        </fieldset>
    </dialog>

    <!-- Dialog: Ver itens e atender pedido -->
    <dialog id="dialogVerItensSID" class="dialogPainel" style="min-width:500px" data-pedido-id="" data-pedido-status="">
        <fieldset>
            <legend id="dialogVerItensSIDLegend">Pedido #0</legend>
            <p id="dialogVerItensSIDInfo" class="painelLabel" style="margin-bottom:10px"></p>
            <div id="dialogVerItensSIDConteudo" class="pedido-lista-itens pedido-lista-itens--view">
                <!-- Itens carregados via JS -->
            </div>
            <div class="row" style="margin-top:15px">
                <button type="button" id="btnAtenderPedidoSID" class="btnPainelFormulario cadastrarUnidade" hidden>✓ Finalizar Pedido</button>
                <button type="button" id="btnFecharVerItensSID" class="btnPainelFormulario cancelarUnidade">Fechar</button>
            </div>
        </fieldset>
    </dialog>

    <!-- Toast de notificação WS -->
    <div id="wsToast" class="ws-toast" hidden>
        <i class="bi bi-bell-fill"></i>
        <span id="wsToastMsg"></span>
    </div>

    <script type="module" src="./js/components/index.js"></script>
</body>
</html>
