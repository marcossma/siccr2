<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICCR - Gerenciamento de Usuários</title>
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dialogs.css">
    <link rel="stylesheet" href="./adm/css/style.css">
    <link rel="stylesheet" href="./adm/css/dialogs.css">
    <link rel="stylesheet" href="./css/ui-kit.css">
    <script type="module" src="./js/scripts.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="/">
                <img src="./img/logo.png" alt="Logo do CCR" title="Logo do CCR" class="logo">
            </a>
            <div class="acesso">
                <a href="#" id="btnEntrar" class="">Entrar</a>
            </div>
        </header>
        <div>
            <responsive-menu></responsive-menu>
        </div>
        <main class="flex flex--column flex--center">

            <section class="titulo_secao flex justify--space--between align--items--center">
                <h1>Gerenciamento de Usuários</h1>
                <button type="button" id="btnNovoUsuario" class="btnPainelFormulario cadastrarUnidade">
                    + Novo Usuário
                </button>
            </section>

            <!-- Lista de usuários -->
            <section class="divListaTiposRecursos informacoes_painel">
                <div class="cabecalho flex">
                    <div class="titulo flex flex--5">Nome</div>
                    <div class="titulo flex flex--2">SIAPE</div>
                    <div class="titulo flex flex--3">Cargo</div>
                    <div class="titulo flex flex--3">Subunidade</div>
                    <div class="titulo flex flex--3">Ações</div>
                </div>
                <div id="listaUsuarios">
                    <!-- Carregado via JS -->
                </div>
            </section>

        </main>
        <footer>Rodapé</footer>
    </div>

    <!-- Formulário de Login DIALOG -->
    <dialog id="dialogLogin">
        <fieldset>
            <legend>Login</legend>
            <form id="frmLogin">
                <div class="row">
                    <input type="text" name="txtLogin" id="txtLogin" class="formInput" placeholder="Digite o seu login">
                </div>
                <div class="row">
                    <input type="password" name="txtSenha" id="txtSenha" class="formInput" placeholder="Digite a sua senha">
                </div>
                <p id="loginErro" class="login-erro" hidden></p>
                <div class="row">
                    <button id="btnLogin" type="button">Entrar</button>
                    <button id="btnCancelarLogin" type="button">Cancelar</button>
                </div>
            </form>
        </fieldset>
    </dialog>

    <!-- Dialog: Cadastro / Edição de usuário -->
    <dialog id="dialogUsuario" class="dialogPainel">
        <fieldset>
            <legend id="dialogUsuarioLegend">Novo Usuário</legend>
            <form id="frmUsuario" class="frmCadastroPainel flex flex--column gap--15">

                <div class="row">
                    <input type="text" id="usuNome" class="formInput width--100" placeholder="Nome completo do servidor">
                    <label class="painelLabel" for="usuNome">Nome completo *</label>
                </div>
                <div class="row">
                    <input type="text" id="usuSiape" class="formInput width--100" placeholder="Ex.: 1234567">
                    <label class="painelLabel" for="usuSiape">SIAPE *</label>
                </div>
                <div class="row">
                    <input type="email" id="usuEmail" class="formInput width--100" placeholder="email@ufsm.br">
                    <label class="painelLabel" for="usuEmail">E-mail institucional</label>
                </div>
                <div class="row">
                    <input type="text" id="usuWhatsapp" class="formInput width--100" placeholder="(55) 99999-9999">
                    <label class="painelLabel" for="usuWhatsapp">WhatsApp</label>
                </div>
                <div class="row">
                    <input type="date" id="usuDataNasc" class="formInput width--100">
                    <label class="painelLabel" for="usuDataNasc">Data de nascimento</label>
                </div>
                <div class="row">
                    <select id="usuPermissao" class="formInput width--100">
                        <!-- Preenchido via JS conforme nível do usuário logado -->
                    </select>
                    <label class="painelLabel" for="usuPermissao">Cargo / Permissão</label>
                </div>

                <!-- Subunidade — visível apenas para diretor e super_admin -->
                <div class="row" id="rowSubunidade">
                    <select id="usuSubunidade" class="formInput width--100">
                        <option value="">Selecione a subunidade...</option>
                    </select>
                    <label class="painelLabel" for="usuSubunidade">Subunidade de lotação</label>
                </div>

                <!-- Senha — obrigatória no cadastro, opcional na edição -->
                <div class="row">
                    <input type="password" id="usuSenha" class="formInput width--100" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
                    <label class="painelLabel" for="usuSenha" id="labelSenha">Senha *</label>
                </div>

                <p id="usuarioErro" class="login-erro" hidden></p>

                <div class="row">
                    <button type="button" id="btnCadastrarUsuario" class="btnPainelFormulario cadastrarUnidade">Cadastrar</button>
                    <button type="button" id="btnAtualizarUsuario" class="btnPainelFormulario atualizarUnidade" hidden>Atualizar</button>
                    <button type="button" id="btnCancelarUsuario" class="btnPainelFormulario cancelarUnidade">Cancelar</button>
                </div>
            </form>
        </fieldset>
    </dialog>

    <!-- Dialog: Gerenciar permissões do usuário -->
    <dialog id="dialogPermissoes" class="dialogPainel" style="min-width:480px">
        <fieldset>
            <legend id="dialogPermissoesLegend">Permissões do usuário</legend>
            <p id="dialogPermissoesInfo" class="painelLabel" style="margin-bottom:12px"></p>
            <div id="listaPermissoes">
                <!-- Carregado via JS -->
            </div>
            <p id="permissoesErro" class="login-erro" hidden></p>
            <div class="row" style="margin-top:15px">
                <button type="button" id="btnFecharPermissoes" class="btnPainelFormulario cancelarUnidade">Fechar</button>
            </div>
        </fieldset>
    </dialog>

    <script type="module" src="./js/components/index.js"></script>
</body>
</html>
