<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICCR - Pedidos de Almoxarifado</title>
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dialogs.css">
    <link rel="stylesheet" href="./adm/css/style.css">
    <link rel="stylesheet" href="./adm/css/dialogs.css">
    <link rel="stylesheet" href="./css/ui-kit.css">
    <script type="module" src="./js/scripts.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="/">
                <img src="./img/logo.png" alt="Logo do CCR" title="Logo do CCR" class="logo">
            </a>
            <div class="acesso">
                <a href="#" id="btnEntrar" class="">Entrar</a>
            </div>
        </header>
        <div>
            <responsive-menu></responsive-menu>
        </div>
        <main class="flex flex--column flex--center">

            <section class="titulo_secao flex justify--space--between align--items--center" style="flex-wrap:wrap;gap:10px">
                <h1>Pedidos de Almoxarifado</h1>
                <div class="flex gap--10 align--items--center">
                    <label class="painelLabel" for="filtroPedidoStatus" style="white-space:nowrap">Exibir:</label>
                    <select id="filtroPedidoStatus" class="formInput" style="padding:6px 10px">
                        <option value="todos">Todos</option>
                        <option value="pendente" selected>Pendentes</option>
                        <option value="atendido">Atendidos</option>
                        <option value="cancelado">Cancelados</option>
                    </select>
                    <button class="btn_adicionar" id="btnNovoPedido">+ Novo Pedido</button>
                </div>
            </section>

            <!-- Lista de pedidos -->
            <section class="divListaTiposRecursos informacoes_painel">
                <div class="cabecalho flex">
                    <div class="titulo flex flex--1">Nº</div>
                    <div class="titulo flex flex--3">Setor</div>
                    <div class="titulo flex flex--1">Itens</div>
                    <div class="titulo flex flex--3">Solicitado</div>
                    <div class="titulo flex flex--3">Concluído</div>
                    <div class="titulo flex flex--2">Status</div>
                    <div class="titulo flex flex--2">Ações</div>
                </div>
                <div id="listaPedidos">
                    <!-- Pedidos carregados via JS -->
                </div>
            </section>

        </main>
        <footer>Rodapé</footer>
    </div>

    <!-- Formulário de Login DIALOG -->
    <dialog id="dialogLogin">
        <fieldset>
            <legend>Login</legend>
            <form id="frmLogin">
                <div class="row">
                    <input type="text" name="txtLogin" id="txtLogin" class="formInput" placeholder="Digite o seu login">
                </div>
                <div class="row">
                    <input type="password" name="txtSenha" id="txtSenha" class="formInput" placeholder="Digite a sua senha">
                </div>
                <p id="loginErro" class="login-erro" hidden></p>
                <div class="row">
                    <button id="btnLogin" type="button">Entrar</button>
                    <button id="btnCancelarLogin" type="button">Cancelar</button>
                </div>
            </form>
        </fieldset>
    </dialog>

    <!-- Dialog: Novo Pedido -->
    <dialog id="dialogNovoPedido" class="dialogPainel" style="min-width:560px">
        <fieldset>
            <legend>Novo Pedido de Almoxarifado</legend>
            <form id="frmNovoPedido" class="flex flex--column gap--15">

                <!-- Seção: adicionar item à lista -->
                <div class="pedido-secao-titulo">Itens do Pedido</div>
                <div class="pedido-add-item flex gap--10 align--items--end">
                    <div class="flex flex--column gap--5 flex--1">
                        <label class="painelLabel" for="itemCodigo">Código (opcional)</label>
                        <input type="text" id="itemCodigo" class="formInput" placeholder="Ex: 001234">
                    </div>
                    <div class="flex flex--column gap--5 flex--4">
                        <label class="painelLabel" for="itemDescricao">Descrição do produto <span class="obrigatorio">*</span></label>
                        <input type="text" id="itemDescricao" class="formInput" placeholder="Ex: Resma de papel A4 75g">
                    </div>
                    <div class="flex flex--column gap--5 flex--1">
                        <label class="painelLabel" for="itemQtd">Qtd. <span class="obrigatorio">*</span></label>
                        <input type="number" id="itemQtd" class="formInput" value="1" min="1">
                    </div>
                    <button type="button" id="btnAdicionarItem" class="btnPainelFormulario" style="height:38px">+ Adicionar</button>
                </div>

                <!-- Lista de itens adicionados -->
                <div id="listaItensNovoPedido" class="pedido-lista-itens">
                    <p class="pedido-lista-vazia">Nenhum item adicionado ainda.</p>
                </div>

                <!-- Observação geral -->
                <div class="flex flex--column gap--5">
                    <label class="painelLabel" for="pedidoObservacao">Observação (opcional)</label>
                    <textarea id="pedidoObservacao" class="formInput" rows="2" placeholder="Informações adicionais para a secretaria..."></textarea>
                </div>

                <p id="pedidoErro" class="login-erro" hidden></p>

                <div class="row">
                    <button type="button" id="btnEnviarPedido" class="btnPainelFormulario cadastrarUnidade">Enviar para Secretaria</button>
                    <button type="button" id="btnCancelarNovoPedido" class="btnPainelFormulario cancelarUnidade">Cancelar</button>
                </div>
            </form>
        </fieldset>
    </dialog>

    <!-- Dialog: Ver itens de um pedido -->
    <dialog id="dialogVerItens" class="dialogPainel" style="min-width:480px" data-pedido-id="" data-pedido-status="">
        <fieldset>
            <legend id="dialogVerItensLegend">Itens do Pedido #0</legend>
            <div id="dialogVerItensConteudo" class="pedido-lista-itens pedido-lista-itens--view">
                <!-- Itens carregados via JS -->
            </div>
            <div class="row" style="margin-top:15px">
                <button type="button" id="btnAtenderPedido" class="btnPainelFormulario cadastrarUnidade" hidden>✓ Marcar como Atendido</button>
                <button type="button" id="btnFecharVerItens" class="btnPainelFormulario cancelarUnidade">Fechar</button>
            </div>
        </fieldset>
    </dialog>

    <!-- Toast de notificação WS -->
    <div id="wsToast" class="ws-toast" hidden>
        <i class="bi bi-bell-fill"></i>
        <span id="wsToastMsg"></span>
    </div>

    <script type="module" src="./js/components/index.js"></script>
</body>
</html>
