<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICCR - Salas</title>
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/dialogs.css">
    <link rel="stylesheet" href="./adm/css/style.css">
    <link rel="stylesheet" href="./adm/css/dialogs.css">
    <link rel="stylesheet" href="./css/ui-kit.css">
    <script type="module" src="./js/scripts.js"></script>
</head>
<body>
    <!-- Formulário de Login DIALOG -->
    <dialog id="dialogLogin">
        <fieldset>
            <legend>Login</legend>
            <form id="frmLogin">
                <div class="row"><input type="text" name="txtLogin" id="txtLogin" class="formInput" placeholder="Digite o seu login"></div>
                <div class="row"><input type="password" name="txtSenha" id="txtSenha" class="formInput" placeholder="Digite a sua senha"></div>
                <p id="loginErro" class="login-erro" hidden></p>
                <div class="row">
                    <button id="btnLogin" type="button">Entrar</button>
                    <button id="btnCancelarLogin" type="button">Cancelar</button>
                </div>
            </form>
        </fieldset>
    </dialog>

    <div class="container">
        <header>
            <a href="/"><img src="./img/logo.png" alt="Logo do CCR" title="Logo do CCR" class="logo"></a>
            <div class="acesso"><a href="#" id="btnEntrar" class="">Entrar</a></div>
        </header>
        <div><responsive-menu></responsive-menu></div>

        <main class="flex flex--column">
            <section class="titulo_secao flex justify--space--between align--items--center" style="flex-wrap:wrap;gap:10px">
                <h1 class="flex align--items--center gap--10"><i class="bi bi-door-closed"></i> Salas</h1>
                <button id="btnAddSala" class="btn_adicionar" style="display:none">Adicionar <i class="bi bi-plus-circle"></i></button>
            </section>

            <section class="flex gap--10 align--items--center flex--wrap" style="margin:8px 0">
                <input type="text" id="slBusca" class="formInput" placeholder="🔎 Buscar em todas as colunas…" style="flex:1;min-width:200px;padding:6px 10px">
                <select id="slPredioF" class="formInput" style="padding:6px 10px"></select>
                <select id="slTipoF" class="formInput" style="padding:6px 10px"></select>
                <select id="slDeptoF" class="formInput" style="padding:6px 10px"></select>
                <button type="button" id="slLimpar" class="btnPainelFormulario" style="padding:6px 12px">Limpar</button>
                <span id="slContagem" class="painelLabel" style="white-space:nowrap"></span>
            </section>

            <section class="informacoes_painel">
                <div class="cabecalho flex">
                    <div class="titulo flex flex--2">Sala</div>
                    <div class="titulo flex flex--2">Prédio</div>
                    <div class="titulo flex flex--3">Departamento</div>
                    <div class="titulo flex flex--2">Tipo</div>
                    <div class="titulo flex flex--1">Lugares</div>
                    <div class="titulo flex flex--4">Descrição</div>
                    <div class="titulo flex flex--2">Agendável</div>
                    <div class="titulo flex flex--2" id="slColAcoes" style="display:none">Ações</div>
                </div>
                <div class="listaUnidades" id="slLista"></div>
            </section>
        </main>
        <footer>Rodapé</footer>
    </div>

    <!-- Dialog: criar/editar sala -->
    <dialog class="dialogPainel" id="dialogSala" style="min-width:500px">
        <fieldset>
            <legend id="slLegend">Cadastro de Sala</legend>
            <form id="frmSala" class="flex flex--column gap--15">
                <input type="hidden" id="slId">
                <div class="row">
                    <input type="text" id="slNome" class="formInput width--100" placeholder="Identificação da sala (ex.: 106, 4303-A)">
                </div>
                <div class="row">
                    <select id="slPredio" class="formInput width--100"></select>
                    <label class="painelLabel" for="slPredio">Prédio</label>
                </div>
                <div class="row">
                    <select id="slSubunidade" class="formInput width--100"></select>
                    <label class="painelLabel" for="slSubunidade">Departamento (subunidade)</label>
                </div>
                <div class="row">
                    <select id="slTipo" class="formInput width--100"></select>
                    <label class="painelLabel" for="slTipo">Tipo de sala</label>
                </div>
                <div class="row">
                    <input type="number" id="slCapacidade" class="formInput width--100" placeholder="Número de lugares (opcional)" min="0">
                    <label class="painelLabel" for="slCapacidade">Capacidade — quantidade de lugares</label>
                </div>
                <div class="row flex gap--10">
                    <div class="flex flex--column flex--1">
                        <input type="number" step="0.01" min="0" id="slLargura" class="formInput width--100" placeholder="Largura (m)">
                        <label class="painelLabel" for="slLargura">Largura (m)</label>
                    </div>
                    <div class="flex flex--column flex--1">
                        <input type="number" step="0.01" min="0" id="slComprimento" class="formInput width--100" placeholder="Comprimento (m)">
                        <label class="painelLabel" for="slComprimento">Comprimento (m)</label>
                    </div>
                    <div class="flex flex--column flex--1">
                        <input type="number" step="0.01" min="0" id="slAltura" class="formInput width--100" placeholder="Altura (m)">
                        <label class="painelLabel" for="slAltura">Altura (m)</label>
                    </div>
                </div>
                <div class="row">
                    <textarea id="slDescricao" class="formInput width--100" placeholder="Observação/descrição (opcional)"></textarea>
                </div>
                <div class="row flex justify--content--center align--items--center gap--10">
                    <label class="formLabel">Sala agendável:</label>
                    <span><input type="radio" name="slAgendavel" value="0" checked> Não</span>
                    <span><input type="radio" name="slAgendavel" value="1"> Sim</span>
                </div>
                <div class="row flex justify--content--center align--items--center gap--10" id="slRowServicos" style="display:none">
                    <label class="formLabel">Presta serviços externos:</label>
                    <span><input type="radio" name="slServicos" value="0" checked> Não</span>
                    <span><input type="radio" name="slServicos" value="1"> Sim</span>
                </div>
                <div class="row">
                    <button type="button" id="btnSalvarSala" class="btnPainelFormulario">Salvar</button>
                    <button type="button" id="btnCancelarSala" class="btnPainelFormulario cancelarUnidade">Cancelar</button>
                </div>
            </form>
        </fieldset>
    </dialog>

    <!-- Dialog: histórico da sala -->
    <dialog class="dialogPainel" id="dialogHistSala" style="min-width:480px">
        <fieldset>
            <legend id="histSalaLegend">Histórico da sala</legend>
            <div id="histSalaLista" style="margin-bottom:12px"></div>
            <div class="row"><button type="button" id="btnFecharHistSala" class="btnPainelFormulario cancelarUnidade">Fechar</button></div>
        </fieldset>
    </dialog>

    <script type="module" src="./js/components/index.js"></script>
</body>
</html>
